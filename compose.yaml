name: bikeshare-forecast

x-app: &app
  image: bikeshare-forecast:local
  build:
    context: .

services:
  api:
    <<: *app
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models:ro
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)
      interval: 10s
      timeout: 3s
      retries: 5

  forecast:
    <<: *app
    profiles: ["jobs"]
    environment:
      PREFECT_SERVER_EPHEMERAL_ENABLED: "True"
    volumes:
      - ./data:/app/data
      - ./models:/app/models:ro
    entrypoint: ["python", "-m", "flows.nightly_forecast"]

  monitoring:
    <<: *app
    profiles: ["jobs"]
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models:ro
      - ./reports:/app/reports
    entrypoint: ["python", "-m", "scripts.run_monitoring"]

  promotion:
    <<: *app
    profiles: ["jobs"]
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models
      - ./reports:/app/reports
    entrypoint: ["python", "-m", "src.training.promote"]
