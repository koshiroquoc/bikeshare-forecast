system:
  name: divvy
  trip_bucket_url: "https://divvy-tripdata.s3.amazonaws.com"

data:
  start_month: "2023-07"
  end_month: "2026-06"
  raw_dir: "data/raw"

weather:
  latitude: 41.8781
  longitude: -87.6298
  timezone: "America/Chicago"
  hourly_vars:
    [
      temperature_2m,
      precipitation,
      snowfall,
      wind_speed_10m,
      relative_humidity_2m,
    ]

scope:
  top_n_stations: 200
  min_trip_seconds: 60
  max_trip_hours: 24

features:
  lag_hours:
    - 24
    - 48
    - 168
  rolling_days:
    - 7
    - 28

backtest:
  n_windows: 4

model:
  objective: poisson
  features:
    - hour_of_day
    - day_of_week
    - month
    - is_weekend
    - is_holiday
    - hour_sin
    - hour_cos
    - month_sin
    - month_cos
    - temperature_2m
    - precipitation
    - snowfall
    - wind_speed_10m
    - relative_humidity_2m
    - lat
    - lng
    - station_id
    - lag_24
    - lag_48
    - lag_168
    - roll_mean_7d
    - roll_mean_28d
  params:
    n_estimators: 2000
    learning_rate: 0.05
    num_leaves: 63
